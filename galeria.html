<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UP MUSIC - Galeria</title>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-B9C3PNT1X7"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag("js", new Date());
  gtag("config", "G-B9C3PNT1X7");

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2244924519509085" crossorigin="anonymous"></script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#001f3f,#0074D9,#2ECC40);min-height:100vh;padding:20px;font-family:Arial;color:white}
.card{background:rgba(0,0,0,0.5);border:2px solid #FFDC00;border-radius:15px;padding:20px;margin:15px auto;max-width:600px}
h2{color:#FFDC00;text-align:center;margin-bottom:20px;font-size:2rem}
.btn{padding:12px 20px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;margin:5px;font-size:1rem}
.btn-azul{background:#0074D9;color:white}
.botoes-centro{text-align:center}
.item-audio{background:rgba(255,255,255,0.1);padding:15px;border-radius:10px;margin:10px 0;position:relative}
audio{width:100%;margin-top:10px}
.btn-deletar{position:absolute;top:10px;right:10px;background:red;color:white;border:none;border-radius:50%;width:30px;height:30px;font-weight:bold}
#google_translate_element{text-align:center;margin:10px 0}
.goog-te-gadget-simple{background:white !important;border:1px solid #ccc !important;border-radius:20px !important;padding:6px 15px !important;display:inline-flex !important;align-items:center !important}
.goog-te-gadget-icon{background:url(https://fonts.gstatic.com/s/i/short-term/release/materialsymbolsoutlined/translate/default/24px.svg) center center no-repeat !important;width:24px !important;height:24px !important;margin-right:8px !important}
.goog-te-menu-value{color:black !important;font-size:14px !important}
</style>
</head>
<body>

<div id="google_translate_element"></div>
<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({pageLanguage: "pt", includedLanguages: "en,es,fr,de,it,ru,zh-CN,ja,ko", layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, "google_translate_element");
}
</script>

<div class="card">
  <h2>🎶 GALERIA DE MÚSICAS</h2>
  <div class="botoes-centro">
    <button class="btn btn-azul" onclick="window.location.href="principal.html"">🔙 VOLTAR</button>
  </div>
  <div id="lista-audios"></div>
</div>

<script>
const tipoUsuario = localStorage.getItem("upmusic_user");
const ehAdmin = tipoUsuario == "admin";

function carregarAudios(){
  const lista = document.getElementById("lista-audios");
  const audios = JSON.parse(localStorage.getItem("lista_audios") || "[]");
  if(audios.length === 0){
    lista.innerHTML = "<p style="text-align:center">Nenhuma música ainda. 🎵</p>";
    return;
  }
  audios.reverse().forEach(audio => {
    const div = document.createElement("div");
    div.className = "item-audio";
    let botaodel = ehAdmin ? `<button class="btn-deletar" onclick="deletar(${audio.id})">🗑️</button>` : "";
    div.innerHTML = `<audio controls src="${audio.url}">${botaodel}`;
    lista.appendChild(div);
  });
}
function deletar(id){
  let audios = JSON.parse(localStorage.getItem("lista_audios") || "[]");
  audios = audios.filter(a => a.id !== id);
  localStorage.setItem("lista_audios", JSON.stringify(audios));
  location.reload();
}
window.onload = carregarAudios;
</script>
</body>
</html>
