<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria - UP MUSIC</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#001f3f,#0074D9,#2ECC40);min-height:100vh;padding:20px;font-family:Arial;color:white}
.card{background:rgba(0,0,0,0.5);border:2px solid #FFDC00;border-radius:15px;padding:20px;margin:15px auto;max-width:600px}
h2{color:#FFDC00;text-align:center;margin-bottom:20px;font-size:2rem}
.btn{padding:15px 20px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;margin:5px;font-size:1.1rem}
.btn-azul{background:#0074D9;color:white}
.btn-vermelho{background:#FF4136;color:white}
.item{background:#222;border:1px solid #444;border-radius:10px;padding:15px;margin:10px 0}
.item p{margin-bottom:10px;font-weight:bold;font-size:1.1rem}
audio{width:100%;height:50px;margin-top:8px}
.vazio{text-align:center;padding:50px;color:#aaa;font-style:italic;font-size:1.3rem}
.botoes-item{text-align:right;margin-top:10px}
</style>
</head>
<body>

<div class="card">
  <h2>🎶 GALERIA DE MÚSICAS</h2>
  <div class="botoes-centro">
    <button class="btn btn-azul" onclick="window.location.href=principal.html">🏠 VOLTAR</button>
  </div>
</div>

<div class="card">
  <div id="lista">
    <p class="vazio">🔄 CARREGANDO...</p>
  </div>
</div>

<script>
function carregarTudo(){
  const divLista = document.getElementById("lista");
  let musicas = JSON.parse(localStorage.getItem("musicas_salvas") || "[]");

  if(musicas.length == 0){
    divLista.innerHTML = "<p class=vazio>😢 NENHUMA MÚSICA AINDA</p>";
    return;
  }

  musicas.reverse();
  divLista.innerHTML = "";

  musicas.forEach(m => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <p>🎵 ${m.nome}</p>
      <audio controls>
        <source src="${m.url}">
      
      <div class="botoes-item">
        <button class="btn btn-vermelho" onclick="deletarMusica(${m.id})">🗑️ DELETAR</button>
      </div>
    `;
    divLista.appendChild(div);
  });
}

function deletarMusica(id){
  if(!confirm("Tem certeza que quer deletar essa música?")) return;
  
  let musicas = JSON.parse(localStorage.getItem("musicas_salvas") || "[]");
  musicas = musicas.filter(m => m.id !== id);
  localStorage.setItem("musicas_salvas", JSON.stringify(musicas));
  
  alert("✅ Música deletada!");
  carregarTudo(); // Atualiza a lista
}

window.onload = carregarTudo;
</script>

</body>
</html>
