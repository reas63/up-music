<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria - UP MUSIC</title>

<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#001f3f,#0074D9,#2ECC40);min-height:100vh;padding:20px;font-family:Arial;color:white}
.card{background:rgba(0,0,0,0.5);border:2px solid #FFDC00;border-radius:15px;padding:20px;margin:15px auto;max-width:600px}
h2{color:#FFDC00;text-align:center;margin-bottom:20px;font-size:2rem}
.btn{padding:12px 20px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;margin:5px;font-size:1.1rem}
.btn-azul{background:#0074D9;color:white}
.btn-vermelho{background:#FF4136;color:white}
.audio-item{background:#222;border:1px solid #444;border-radius:10px;padding:15px;margin:10px 0}
.audio-item p{margin-bottom:10px;font-weight:bold;font-size:1.1rem}
audio{width:100%;height:50px;margin-top:8px}
audio::-webkit-media-controls-panel{background:#0074D9}
.vazio{text-align:center;padding:30px;color:#aaa;font-style:italic;font-size:1.2rem}
.botoes-item{text-align:right;margin-top:10px}
#google_translate_element{text-align:center;margin:10px 0}
.goog-te-gadget-simple{background:white !important;border:1px solid #ccc !important;border-radius:20px !important;padding:6px 15px !important;display:inline-flex !important;align-items:center !important}
.goog-te-gadget-icon{background:url(https://fonts.gstatic.com/s/i/short-term/release/materialsymbolsoutlined/translate/default/24px.svg) center center no-repeat !important;width:24px !important;height:24px !important;margin-right:8px !important}
.goog-te-menu-value{color:black !important;font-size:14px !important}
</style>
</head>
<body>

<div id="google_translate_element"></div>
<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({pageLanguage: "pt", includedLanguages: "en,es,fr,de,it,ru,zh-CN,ja,ko", layout: google.translate.Translate.InlineLayout.SIMPLE}, "google_translate_element");
}
</script>

<div class="card">
  <h2>🎶 GALERIA DE MÚSICAS</h2>
  <div class="botoes-centro">
    <button class="btn btn-azul" onclick="window.location.href=principal.html">🏠 VOLTAR</button>
  </div>
</div>

<div class="card">
  <div id="listaAudios">
    <p class="vazio">🔄 CARREGANDO...</p>
  </div>
</div>

<script>
function carregarAudios(){
  const listaAudios = document.getElementById("listaAudios");
  let audios = JSON.parse(localStorage.getItem("lista_audios") || "[]");

  if(audios.length == 0){
    listaAudios.innerHTML = "<p class=vazio>🎵 Nenhuma música cadastrada ainda 🎵</p>";
    return;
  }

  audios.reverse();
  listaAudios.innerHTML = "";

  audios.forEach(audio => {
    const div = document.createElement("div");
    div.className = "audio-item";
    div.innerHTML = `
      <p>🎵 ${audio.nome}</p>
      <audio controls preload="none">
        <source src="${audio.url}">
        Seu navegador não suporta áudio.
      
      <div class="botoes-item">
        <button class="btn btn-vermelho" onclick="deletarMusica(${audio.id})">🗑️ DELETAR</button>
      </div>
    `;
    listaAudios.appendChild(div);
  });
}

function deletarMusica(id){
  if(!confirm("Tem certeza que deseja deletar?")) return;
  let audios = JSON.parse(localStorage.getItem("lista_audios") || "[]");
  audios = audios.filter(a => a.id !== id);
  localStorage.setItem("lista_audios", JSON.stringify(audios));
  alert("✅ Deletado!");
  carregarAudios();
}

window.onload = carregarAudios;
</script>

</body>
</html>
