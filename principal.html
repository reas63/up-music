<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UP MUSIC</title>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2244924519509085" crossorigin="anonymous"></script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#001f3f,#0074D9,#2ECC40);min-height:100vh;padding:20px;font-family:Arial;color:white}
.card{background:rgba(0,0,0,0.5);border:2px solid #FFDC00;border-radius:15px;padding:20px;margin:15px auto;max-width:600px}
h2{color:#FFDC00;text-align:center;margin-bottom:20px;font-size:2rem}
.btn{padding:12px 20px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;margin:5px;font-size:1rem}
.btn-amarelo{background:#FFDC00;color:black}
.btn-azul{background:#0074D9;color:white}
.btn-roxo{background:linear-gradient(45deg,#6225E6,#BA68C8);color:white}
.btn-copia{background:#111;color:#0f0;border:1px solid #0f0}
.btn-upload{width:100%;padding:20px;font-size:1.3rem;background:linear-gradient(90deg,#0074D9,#00c851);color:white;border:none;border-radius:10px;margin:15px 0}
.botoes-centro{text-align:center}
.endereco{background:#111;padding:10px;border-radius:8px;margin:8px 0;font-family:monospace;font-size:0.9rem;word-break:break-all;border:1px solid #333}
#google_translate_element{text-align:center;margin:10px 0}
.goog-te-gadget-simple{background:white !important;border:1px solid #ccc !important;border-radius:20px !important;padding:6px 15px !important;display:inline-flex !important;align-items:center !important}
.goog-te-gadget-icon{background:url(https://fonts.gstatic.com/s/i/short-term/release/materialsymbolsoutlined/translate/default/24px.svg) center center no-repeat !important;width:24px !important;height:24px !important;margin-right:8px !important}
.goog-te-menu-value{color:black !important;font-size:14px !important}

/* ESTILO DA BARRA DE PROGRESSO */
.progress-container{width:100%;height:20px;background:#333;border-radius:10px;margin:10px 0;overflow:hidden;display:none}
.progress-bar{height:100%;background:linear-gradient(90deg,#00c851,#FFDC00);width:0%;transition:width 0.3s ease;text-align:center;line-height:20px;font-weight:bold;color:black}
.status-text{text-align:center;margin:5px 0;font-size:0.9rem;display:none}
</style>
</head>
<body>

<div id="google_translate_element"></div>
<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({pageLanguage: "pt", includedLanguages: "en,es,fr,de,it,ru,zh-CN,ja,ko", layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, "google_translate_element");
}
</script>

<div class="card">
  <h2>🎵 UP MUSIC</h2>
  <p style="text-align:center">Sua galeria de sons e músicas 🎧</p>
  <div class="botoes-centro">
    <button class="btn btn-amarelo" onclick="window.location.href=galeria.html">🎶 VER GALERIA</button>
    <button class="btn" style="background:#333;color:white" onclick="sair()">🚪 SAIR</button>
  </div>
</div>

<div class="card" id="areaUpload">
  <label class="btn-upload">
    🎤 ENVIAR ÁUDIO (MP3)
    <input type="file" id="arquivo" accept="audio/mp3,audio/wav" style="display:none" onchange="enviar(this)">
  </label>

  <!-- BARRA DE PROGRESSO -->
  <div class="status-text" id="statusText">Enviando...</div>
  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar">0%</div>
  </div>
</div>

<div class="card">
  <h2>💸 FAÇA UMA DOAÇÃO</h2>
  <h3 style="color:#2ECC40;text-align:center">🇧🇷 PIX</h3>
  <div class="endereco" id="pix">reas63@hotmail.com</div>
  <button class="btn btn-copia" onclick="copiar(pix)">📋 COPIAR CHAVE PIX</button>

  <hr style="border:1px solid #333;margin:20px 0">

  <h3 style="color:#6225E6;text-align:center">🪙 USDC - REDE BASE</h3>
  <div class="endereco" id="crypto">0x27c4261074BB66a87F976769259368E4050fE771</div>
  <button class="btn btn-roxo" onclick="copiar(crypto)">📋 COPIAR ENDEREÇO</button>
</div>

<script>
// ✅ CONFIGURAÇÃO DO CLOUDINARY
const CLOUD_NAME = "dlmucudnw";
const UPLOAD_PRESET = "up-music";

const tipoUsuario = localStorage.getItem("upmusic_user");
const ehAdmin = tipoUsuario == "admin";

window.onload = function(){
  if(!ehAdmin) document.getElementById("areaUpload").style.display = "none";
};

function enviar(input){
  if(!input.files || !input.files[0]) return;
  const arquivo = input.files[0];
  const formulario = new FormData();
  formulario.append("file", arquivo);
  formulario.append("upload_preset", UPLOAD_PRESET);

  // MOSTRA BARRA DE PROGRESSO
  document.getElementById("progressContainer").style.display = "block";
  document.getElementById("statusText").style.display = "block";
  document.getElementById("progressBar").style.width = "0%";
  document.getElementById("progressBar").innerText = "0%";

  // USA XMLHttpRequest PARA MONITORAR O PROGRESSO
  const xhr = new XMLHttpRequest();
  xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/raw/upload`);

  // ATUALIZA A BARRA CONFORME ENVIA
  xhr.upload.onprogress = function(e){
    if(e.lengthComputable){
      const porcentagem = Math.round((e.loaded / e.total) * 100);
      document.getElementById("progressBar").style.width = porcentagem + "%";
      document.getElementById("progressBar").innerText = porcentagem + "%";
    }
  };

  // QUANDO TERMINAR
  xhr.onload = function(){
    if(xhr.status == 200){
      const dados = JSON.parse(xhr.responseText);
      if(dados.secure_url){
        salvarAudio(dados.secure_url, arquivo.name);
        alert("✅ Áudio salvo com sucesso!");
        input.value = "";
      }
    }else{
      alert("❌ Erro ao enviar! Tente novamente.");
    }
    // ESCONDE BARRA
    document.getElementById("progressContainer").style.display = "none";
    document.getElementById("statusText").style.display = "none";
  };

  xhr.send(formulario);
}

function salvarAudio(url, nome){
  let audios = JSON.parse(localStorage.getItem("lista_audios") || "[]");
  audios.push({url: url, nome: nome, id: Date.now()});
  localStorage.setItem("lista_audios", JSON.stringify(audios));
}

function sair(){
  localStorage.removeItem("upmusic_user");
  window.location.href="index.html";
}
function copiar(id){
  navigator.clipboard.writeText(document.getElementById(id).innerText).then(()=>alert("✅ Copiado!"));
}
</script>
</body>
</html>
