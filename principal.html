<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UP MUSIC</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#001f3f,#0074D9,#2ECC40);min-height:100vh;padding:20px;font-family:Arial;color:white}
.card{background:rgba(0,0,0,0.5);border:2px solid #FFDC00;border-radius:15px;padding:20px;margin:15px auto;max-width:600px}
h2{color:#FFDC00;text-align:center;margin-bottom:20px;font-size:2rem}
.btn{padding:15px 20px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;margin:5px;font-size:1.1rem}
.btn-amarelo{background:#FFDC00;color:black}
.btn-azul{background:#0074D9;color:white}
.btn-roxo{background:linear-gradient(45deg,#6225E6,#BA68C8);color:white}
.btn-copia{background:#111;color:#0f0;border:1px solid #0f0}
.btn-selecionar{width:100%;padding:25px;font-size:1.5rem;background:linear-gradient(90deg,#0074D9,#00c851);color:white;border:none;border-radius:10px;margin:15px 0}
.status-text{text-align:center;margin:10px 0;font-size:1rem}
</style>
</head>
<body>

<div class="card">
  <h2>🎵 UP MUSIC</h2>
  <p style="text-align:center;font-size:1.2rem">Sua galeria de sons e músicas 🎧</p>
  <div class="botoes-centro">
    <button class="btn btn-amarelo" onclick="window.location.href=galeria.html">🎶 VER GALERIA</button>
    <button class="btn" style="background:#333;color:white" onclick="sair()">🚪 SAIR</button>
  </div>
</div>

<div class="card" id="areaUpload">
  <label class="btn-selecionar">
    🎤 CLIQUE AQUI PARA SELECIONAR
    <input type="file" id="arquivo" accept="audio/*" style="display:none" onchange="escolher(this)">
  </label>
  <p class="status-text" id="statusTexto">✅ Pronto para receber músicas</p>
  <button class="btn btn-azul" onclick="salvar()" style="width:100%;margin-top:15px;padding:15px;font-size:1.2rem">💾 SALVAR MÚSICA</button>
</div>

<div class="card">
  <h2>💸 FAÇA UMA DOAÇÃO</h2>
  <h3 style="color:#2ECC40;text-align:center">🇧🇷 PIX</h3>
  <div style="background:#111;padding:10px;border-radius:8px;margin:8px 0;font-family:monospace;font-size:0.9rem" id="pix">reas63@hotmail.com</div>
  <button class="btn btn-copia" onclick="copiar(pix)">📋 COPIAR CHAVE PIX</button>

  <hr style="border:1px solid #333;margin:20px 0">

  <h3 style="color:#6225E6;text-align:center">🪙 USDC - REDE BASE</h3>
  <div style="background:#111;padding:10px;border-radius:8px;margin:8px 0;font-family:monospace;font-size:0.9rem" id="crypto">0x27c4261074BB66a87F976769259368E4050fE771</div>
  <button class="btn btn-roxo" onclick="copiar(crypto)">📋 COPIAR ENDEREÇO</button>
</div>

<script>
let arquivoSelecionado = null;

function escolher(input){
  if(!input.files || !input.files[0]) return;
  arquivoSelecionado = input.files[0];
  document.getElementById("statusTexto").innerText = "📁 " + arquivoSelecionado.name;
}

function salvar(){
  if(!arquivoSelecionado){
    alert("⚠️ Selecione uma música primeiro!");
    return;
  }

  const leitor = new FileReader();
  leitor.onload = function(e){
    const dados = {
      nome: arquivoSelecionado.name,
      url: e.target.result,
      id: Date.now()
    };
    
    let lista = JSON.parse(localStorage.getItem("musicas_salvas") || "[]");
    lista.push(dados);
    localStorage.setItem("musicas_salvas", JSON.stringify(lista));
    
    alert("✅ SALVO COM SUCESSO!");
    document.getElementById("statusTexto").innerText = "✅ Pronto para receber músicas";
    arquivoSelecionado = null;
    document.getElementById("arquivo").value = "";
  };
  
  leitor.readAsDataURL(arquivoSelecionado);
}

function sair(){
  localStorage.removeItem("upmusic_user");
  window.location.href="index.html";
}
function copiar(id){
  navigator.clipboard.writeText(document.getElementById(id).innerText).then(()=>alert("✅ Copiado!"));
}
</script>
</body>
</html>
