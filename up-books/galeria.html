*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#1a2a6c,#b21f1f,#1a2a6c);min-height:100vh;padding:20px;font-family:Arial;color:white}

h2{color:#FFD700;text-align:center;margin-bottom:20px;font-size:2rem}

.btn-azul{background:#0074D9;color:white}
.btn-vermelho{background:#FF4136;color:white}
.btn-verde{background:#2ECC40;color:white}
.livro-item{background:#222;border:1px solid #444;border-radius:10px;padding:15px;margin:10px 0}
.livro-titulo{font-size:1.3rem;color:#FFD700;margin-bottom:5px}
.livro-autor{font-size:0.9rem;color:#aaa;margin-bottom:10px}
.texto-livro{background:#111;border:1px solid #333;padding:15px;border-radius:10px;margin:10px 0;max-height:400px;overflow:auto;text-align:justify;line-height:1.6}

<div class="card">

  <div class="botoes-centro">
    <a href="principal.html" class="btn btn-amarelo">🏠 VOLTAR</a>
  </div>
</div>

<div class="card">
  <div id="listaLivros">
    <p style="text-align:center;color:#aaa;font-size:1.2rem">🔄 CARREGANDO...</p>
  </div>
</div>

<!-- ANUNCIO FINAL -->
<div class="ad-container">
  <ins class="adsbygoogle"
       style="display:block"

  <script>
       (adsbygoogle = window.adsbygoogle || []).push({});
  </script>
</div>

<script>
const tipoUsuario = localStorage.getItem("upbooks_user");
const ehAdmin = tipoUsuario == "admin";

function carregarLivros(){
  const listaLivros = document.getElementById("listaLivros");
  let livros = JSON.parse(localStorage.getItem("lista_livros") || "[]");

  if(livros.length == 0){
    listaLivros.innerHTML = "<p style='text-align:center;color:#aaa;font-size:1.2rem'>📚 Nenhum livro cadastrado ainda.</p>";
    return;
  }

  listaLivros.innerHTML = "";

  for(let i = 0; i < livros.length; i++){
    const livro = livros[i];
    const div = document.createElement("div");
    div.className = "livro-item";
    
    let botoes = "";
    botoes += '<a href="' + livro.urlEpub + '" download="' + livro.titulo + '.epub" class="btn btn-verde">📘 BAIXAR EPUB</a>';
    botoes += '<button class="btn btn-azul" onclick=\'baixarTexto("' + livro.titulo + '", `' + livro.texto + '`)\'>📄 BAIXAR TXT</button>';
    
    if(ehAdmin){
      botoes += '<button class="btn btn-vermelho" onclick="deletarLivro(' + livro.id + ')">🗑️ DELETAR</button>';
    }

    div.innerHTML = `
      <h3 class="livro-titulo">${livro.titulo}</h3>
      <p class="livro-autor">✍️ ${livro.autor || "Desconhecido"}</p>
      <div class="texto-livro">${livro.texto.replace(/\n/g, "<br>")}</div>
      <div class="botoes-centro">${botoes}</div>
    `;
    listaLivros.appendChild(div);
  }
}

function baixarTexto(titulo, texto){
  const blob = new Blob([texto], {type: "text/plain"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = titulo + ".txt";
  a.click();
}

function deletarLivro(id){
  if(!confirm("Tem certeza que deseja deletar este livro?")) return;
  let livros = JSON.parse(localStorage.getItem("lista_livros") || "[]");
  livros = livros.filter(l => l.id != id);
  localStorage.setItem("lista_livros", JSON.stringify(livros));
  carregarLivros();
}

window.onload = carregarLivros;
</script>
