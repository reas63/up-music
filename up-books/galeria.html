<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meus Livros - UP BOOKS</title>

<!-- 🌐 BOTÃO GOOGLE TRADUTOR -->
<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({pageLanguage: 'pt', layout: google.translate.TranslateElement.FloatPosition.TOP_RIGHT}, 'google_translate_element');
}
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#1a2a6c,#b21f1f,#1a2a6c);min-height:100vh;padding:20px;font-family:Arial;color:white}
.card{background:rgba(0,0,0,0.5);border:2px solid #FFD700;border-radius:15px;padding:20px;margin:15px auto;max-width:600px}
h2{color:#FFD700;text-align:center;margin-bottom:20px;font-size:2rem}
.texto-livro{background:#111;padding:15px;border-radius:10px;margin:15px 0;line-height:1.6;font-size:1.1rem;white-space:pre-wrap}
.btn{padding:12px 20px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;margin:5px;font-size:1.1rem;width:100%;max-width:300px}
.btn-verde{background:#2ECC40;color:white}
.btn-azul{background:#0074D9;color:white}
.btn-vermelho{background:#FF4136;color:white}
.botoes-centro{text-align:center;margin-top:20px}
</style>
</head>
<body>

<div id="google_translate_element"></div>

<div class="card">
  <h2>📚 MEUS LIVROS</h2>
  <div class="botoes-centro">
    <a href="./principal.html" class="btn btn-azul">🔙 VOLTAR</a>
  </div>
</div>

<div id="lista-livros"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const tipoUsuario = localStorage.getItem("upbooks_user");
const ehAdmin = tipoUsuario == "admin";

function exibirLivros(){
  const dados = localStorage.getItem("meus_livros");
  const container = document.getElementById("lista-livros");

  if(!dados){
    container.innerHTML = "<div class='card'><p style='text-align:center;'>Nenhum livro salvo ainda.</p></div>";
    return;
  }

  const livros = JSON.parse(dados);
  container.innerHTML = "";

  livros.forEach(livro => {
    const div = document.createElement("div");
    div.className = "card";
    
    div.innerHTML = `
      <h3>${livro.titulo}</h3>
      <p><strong>Autor:</strong> ${livro.autor || 'Desconhecido'}</p>
      <div class="texto-livro">${livro.texto.replace(/\n/g, "<br>")}</div>
      
      <div class="botoes-centro">
        <button class="btn btn-verde" onclick="baixarArquivo(this, 'epub')">📘 BAIXAR EPUB</button>
        <button class="btn btn-azul" onclick="baixarArquivo(this, 'txt')">📄 BAIXAR TXT</button>
        <br>
        <button class="btn btn-vermelho" onclick="deletarLivro(${livro.id}, this)">🗑️ DELETAR</button>
      </div>
    `;
    
    div.querySelector('.btn-verde').dataset.titulo = livro.titulo;
    div.querySelector('.btn-verde').dataset.autor = livro.autor;
    div.querySelector('.btn-verde').dataset.texto = livro.texto;
    div.querySelector('.btn-azul').dataset.titulo = livro.titulo;
    div.querySelector('.btn-azul').dataset.autor = livro.autor;
    div.querySelector('.btn-azul').dataset.texto = livro.texto;

    container.appendChild(div);
  });
}

function baixarArquivo(botao, tipo){
  const titulo = botao.dataset.titulo;
  const autor = botao.dataset.autor;
  const texto = botao.dataset.texto;

  if(tipo == 'epub'){
    const zip = new JSZip();
    zip.file("mimetype", "application/epub+zip");
    
    const metaInf = zip.folder("META-INF");
    metaInf.file("container.xml", `<?xml version="1.0" encoding="UTF-8"?>
<container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container">
  <rootfiles><rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/></rootfiles>
</container>`);

    const oebps = zip.folder("OEBPS");
    oebps.file("index.html", `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>${titulo}</title>
<style>body{font-family:Arial,sans-serif;line-height:1.6;padding:20px;}</style>
</head>
<body>
<h1>${titulo}</h1>
<h2>Por ${autor}</h2>
<hr>
<div>${texto.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>')}</div>
</body>
</html>`);
    
    oebps.file("content.opf", `<?xml version="1.0" encoding="utf-8"?>
<package xmlns="http://www.idpf.org/2007/opf" version="2.0">
  <metadata xmlns:dc="http://purl.org/dc/elements/1.1/">
    <dc:title>${titulo}</dc:title>
    <dc:creator>${autor}</dc:creator>
    <dc:language>pt-BR</dc:language>
  </metadata>
  <manifest>
    <item id="index" href="index.html" media-type="application/xhtml+xml"/>
  </manifest>
  <spine>
    <itemref id="index"/>
  </spine>
</package>`);

    zip.generateAsync({type:"blob", mimeType:"application/epub+zip"}).then(content => {
      const url = URL.createObjectURL(content);
      const a = document.createElement("a");
      a.href = url;
      a.download = titulo + ".epub";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });
  }
  else if(tipo == 'txt'){
    const blob = new Blob([`${titulo}\nPor ${autor}\n\n${texto}`], {type: "text/plain;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = titulo + ".txt";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
}

function deletarLivro(id, botao){
  botao.parentElement.parentElement.remove();
  let livros = JSON.parse(localStorage.getItem("meus_livros") || "[]");
  livros = livros.filter(l => l.id != id);
  localStorage.setItem("meus_livros", JSON.stringify(livros));
}

window.onload = exibirLivros;
</script>

</body>
</html>
