<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Principal - UP BOOKS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#1a2a6c,#b21f1f,#1a2a6c);min-height:100vh;padding:20px;font-family:Arial;color:white}
.card{background:rgba(0,0,0,0.5);border:2px solid #FFD700;border-radius:15px;padding:20px;margin:15px auto;max-width:600px}
h2{color:#FFD700;text-align:center;margin-bottom:20px;font-size:2rem}
input, textarea{width:100%;padding:15px;margin:10px 0;border:none;border-radius:10px;background:#222;color:white;font-size:1.1rem;border:1px solid #444}
textarea{min-height:200px;resize:vertical}
.btn{padding:12px 20px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;margin:5px;font-size:1.1rem;text-decoration:none;display:inline-block}
.btn-amarelo{background:#FFD700;color:black}
.btn-verde{background:#2ECC40;color:white}
.btn-azul{background:#0074D9;color:white}
.botoes-centro{text-align:center;margin-top:20px}
.ad-container{text-align:center;margin:20px 0}
</style>
</head>
<body>

<div class="card">
  <h2>📖 UP BOOKS</h2>
  <div class="botoes-centro">
    <a href="galeria.html" class="btn btn-amarelo">📚 VER LIVROS</a>
    <a href="index.html" class="btn btn-azul">🚪 SAIR</a>
  </div>
</div>

<div class="card" id="areaAdmin">
  <h2>✍️ CRIAR NOVO LIVRO</h2>
  
  <input type="text" id="titulo" placeholder="Título do Livro">
  <input type="text" id="autor" placeholder="Nome do Autor">
  <textarea id="texto" placeholder="Escreva o conteúdo do livro aqui..."></textarea>

  <div class="botoes-centro">
    <button class="btn btn-verde" onclick="gerarEpub()">📘 GERAR EPUB</button>
    <button class="btn btn-azul" onclick="gerarTxt()">📄 GERAR TXT</button>
    <button class="btn btn-amarelo" onclick="salvarLivro()">💾 SALVAR LIVRO</button>
  </div>
</div>

<script>
const tipoUsuario = localStorage.getItem("upbooks_user");
const ehAdmin = tipoUsuario == "admin";

if(!ehAdmin){
  document.getElementById("areaAdmin").style.display = "none";
}

// Função para criar EPUB válido usando JSZip
function gerarEpub() {
  const titulo = document.getElementById("titulo").value || "Livro";
  const autor = document.getElementById("autor").value || "Desconhecido";
  const texto = document.getElementById("texto").value;

  if (!texto) {
    alert("Escreva algum texto primeiro!");
    return;
  }

  // Carrega a biblioteca JSZip dinamicamente
  if (!window.JSZip) {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    script.onload = () => criarEpub(titulo, autor, texto);
    document.head.appendChild(script);
  } else {
    criarEpub(titulo, autor, texto);
  }
}

function criarEpub(titulo, autor, texto) {
  const zip = new JSZip();

  // Estrutura básica de um arquivo EPUB
  zip.file("mimetype", "application/epub+zip");
  
  const metaInf = zip.folder("META-INF");
  metaInf.file("container.xml", `<?xml version="1.0" encoding="UTF-8"?>
<container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container">
  <rootfiles>
    <rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/>
  </rootfiles>
</container>`);

  const oebps = zip.folder("OEBPS");
  
  // Arquivo de conteúdo
  const conteudoHtml = `<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>${titulo}</title>
</head>
<body>
  <h1>${titulo}</h1>
  <h2>Por ${autor}</h2>
  <div>${texto.replace(/\n/g, "<br/><br/>")}</div>
</body>
</html>`;

  oebps.file("index.html", conteudoHtml);

  // Arquivo de configuração
  oebps.file("content.opf", `<?xml version="1.0" encoding="utf-8"?>
<package xmlns="http://www.idpf.org/2007/opf" version="2.0" unique-identifier="uid">
  <metadata xmlns:dc="http://purl.org/dc/elements/1.1/">
    <dc:title>${titulo}</dc:title>
    <dc:creator>${autor}</dc:creator>
    <dc:language>pt</dc:language>
    <dc:identifier id="uid">urn:uuid:12345678-1234-5678-1234-567812345678</dc:identifier>
  </metadata>
  <manifest>
    <item id="index" href="index.html" media-type="application/xhtml+xml"/>
  </manifest>
  <spine>
    <itemref idref="index"/>
  </spine>
</package>`);

  // Gerar o arquivo .epub
  zip.generateAsync({type:"blob", mimeType:"application/epub+zip"}).then(function(content) {
    const url = URL.createObjectURL(content);
    const a = document.createElement("a");
    a.href = url;
    a.download = titulo + ".epub";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    alert("✅ EPUB baixado com sucesso!");
  });
}

function gerarTxt(){
  const titulo = document.getElementById("titulo").value || "Livro";
  const autor = document.getElementById("autor").value || "Desconhecido";
  const texto = document.getElementById("texto").value;

  if(!texto){
    alert("Escreva algum texto primeiro!");
    return;
  }

  const conteudo = `${titulo}\nPor ${autor}\n\n${texto}`;
  const blob = new Blob([conteudo], {type: "text/plain;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = titulo + ".txt";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  alert("✅ TXT baixado com sucesso!");
}

function salvarLivro(){
  const titulo = document.getElementById("titulo").value;
  const autor = document.getElementById("autor").value;
  const texto = document.getElementById("texto").value;

  if(!titulo || !texto){
    alert("Preencha título e texto!");
    return;
  }

  const livro = {
    id: Date.now(),
    titulo: titulo,
    autor: autor,
    texto: texto
  };

  let livros = JSON.parse(localStorage.getItem("lista_livros") || "[]");
  livros.push(livro);
  localStorage.setItem("lista_livros", JSON.stringify(livros));

  alert("✅ Livro salvo com sucesso!");
  document.getElementById("titulo").value = "";
  document.getElementById("autor").value = "";
  document.getElementById("texto").value = "";
}
</script>

</body>
</html>
