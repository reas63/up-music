<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - UP MUSIC</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#001f3f,#0074D9,#2ECC40);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Arial}
.login-card{background:rgba(0,0,0,0.7);padding:30px;border-radius:20px;border:2px solid #FFDC00;width:90%;max-width:400px;text-align:center;color:white}
h1{color:#FFDC00;margin-bottom:20px;font-size:2.2rem}
input{width:100%;padding:15px;margin:10px 0;border:none;border-radius:10px;font-size:1rem;background:#222;color:white;border:1px solid #444}
button{width:100%;padding:15px;background:linear-gradient(45deg,#0074D9,#00c851);color:white;border:none;border-radius:10px;font-size:1.2rem;font-weight:bold;cursor:pointer;margin-top:15px}
button:hover{opacity:0.9}
.erro{color:#ff4444;margin-top:10px;display:none}
</style>
</head>
<body>
<div class="login-card">
  <h1>🎵 UP MUSIC</h1>
  <p>Digite a senha para entrar</p>
  <input type="password" id="senha" placeholder="🔑 Senha de acesso">
  <button onclick="entrar()">ENTRAR 🚪</button>
  <div class="erro" id="msgErro">❌ Senha incorreta! Tente novamente.</div>
</div>

<script>
function entrar(){
  const senhaCorreta = "S46c!B!poW-5";
  const senhaDigitada = document.getElementById("senha").value;
  const msgErro = document.getElementById("msgErro");

  if(senhaDigitada === senhaCorreta){
    localStorage.setItem("upmusic_user", "admin");
    window.location.href = "principal.html";
  }else{
    msgErro.style.display = "block";
    document.getElementById("senha").value = "";
  }
}
</script>
</body>
</html>
