<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#001f3f,#0074D9,#2ECC40);min-height:100vh;padding:20px;font-family:Arial;color:white}
.card{background:rgba(0,0,0,0.5);border:2px solid #FFDC00;border-radius:15px;padding:20px;margin:15px auto;max-width:600px}
h2{color:#FFDC00;text-align:center;margin-bottom:20px;font-size:2rem}
.btn{padding:12px 20px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;margin:5px;font-size:1rem}
.btn-verde{background:#2ECC40;color:black}
.form-group{margin:15px 0}
label{display:block;margin-bottom:5px}
input, select{width:100%;padding:10px;border-radius:8px;border:none;background:#222;color:white;font-size:1rem}
#google_translate_element{text-align:center;margin:10px 0}
.goog-te-gadget-simple{background:white !important;border:1px solid #ccc !important;border-radius:20px !important;padding:6px 15px !important;display:inline-flex !important;align-items:center !important}
.goog-te-gadget-icon{background:url(https://fonts.gstatic.com/s/i/short-term/release/materialsymbolsoutlined/translate/default/24px.svg) center center no-repeat !important;width:24px !important;height:24px !important;margin-right:8px !important}
.goog-te-menu-value{color:black !important;font-size:14px !important}
</style>
</head>
<body>

<div id="google_translate_element"></div>
<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({pageLanguage: pt, includedLanguages: en,es,fr,de,it,ru,zh-CN,ja,ko, layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, google_translate_element);
}
</script>

<div class="card">
  <h2>🎵 UP MUSIC</h2>
  <p style="text-align:center;margin-bottom:20px">Exposição de Áudios e Músicas</p>

  <div class="form-group">
    <label>Você é:</label>
    <select id="tipo" onchange="mostrarSenha()">
      <option value="visitante">Visitante</option>
      <option value="admin">Administrador</option>
    </select>
  </div>

  <div class="form-group" id="campo-senha" style="display:none;">
    <label>Digite a senha:</label>
    <input type="password" id="senha" placeholder="••••••••">
  </div>

  <div class="botoes-centro">
    <button class="btn btn-verde" onclick="entrar()">ENTRAR 🚪</button>
  </div>
</div>

<script>
function mostrarSenha(){
  const tipo = document.getElementById(tipo).value;
  document.getElementById(campo-senha).style.display = (tipo === "admin") ? "block" : "none";
}
function entrar(){
  const tipo = document.getElementById(tipo).value;
  const senha = document.getElementById(senha).value;
  const SENHA_CORRETA = "S46c!B!poW-5";

  if(tipo === "admin" && senha !== SENHA_CORRETA){
    alert("❌ SENHA INCORRETA!");
    return;
  }
  localStorage.setItem("upmusic_user", tipo);
  window.location.href = "principal.html";
}
</script>
</body>
</html>
